<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест отображения тендеров</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        body { padding: 20px; }
        .test-result { margin-top: 20px; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Тест отображения тендеров</h1>
        <p>Проверка работы API и отображения данных</p>
        
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Проверка API</h5>
            </div>
            <div class="card-body">
                <button id="testApiBtn" class="btn btn-primary">Тестировать API</button>
                <div id="apiResult" class="test-result"></div>
            </div>
        </div>
        
        <div class="card mt-4">
            <div class="card-header">
                <h5 class="mb-0">Данные тендеров</h5>
            </div>
            <div class="card-body">
                <div id="tendersData" class="test-result"></div>
            </div>
        </div>
        
        <div class="card mt-4">
            <div class="card-header">
                <h5 class="mb-0">Проверка форматирования</h5>
            </div>
            <div class="card-body">
                <div id="formattingTest" class="test-result"></div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('testApiBtn').addEventListener('click', testApi);
        
        async function testApi() {
            const apiResult = document.getElementById('apiResult');
            const tendersData = document.getElementById('tendersData');
            const formattingTest = document.getElementById('formattingTest');
            
            apiResult.innerHTML = '<div class="alert alert-info">Тестирование API...</div>';
            
            try {
                // Test API endpoint
                const response = await fetch('http://localhost:5000/api/foundtenders?page=1&pageSize=5');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                // Display API result
                apiResult.innerHTML = `
                    <div class="alert alert-success">
                        <strong>API работает!</strong><br>
                        Статус: ${response.status}<br>
                        Тендеров: ${data.tenders ? data.tenders.length : 0}<br>
                        Всего: ${data.totalCount || 0}
                    </div>
                `;
                
                // Display tenders data
                if (data.tenders && data.tenders.length > 0) {
                    let html = '<h6>Пример тендера:</h6>';
                    const tender = data.tenders[0];
                    
                    // Test formatting functions
                    const regionCode = tender.region || '77';
                    const regionName = getRegionName(regionCode);
                    const customerName = formatCustomerName(tender.customerName || 'ИНН: 7706114267');
                    const maxPrice = formatMaxPrice(tender.maxPrice || 3211649.00);
                    const publishDate = formatDate(tender.publishDate || '2025-04-21T15:33:39Z');
                    
                    html += `
                        <table class="table table-sm">
                            <tr><th>Поле</th><th>Значение</th><th>Форматированное</th></tr>
                            <tr><td>Регион (код)</td><td>${regionCode}</td><td>${regionName}</td></tr>
                            <tr><td>Заказчик</td><td>${tender.customerName || 'ИНН: 7706114267'}</td><td>${customerName}</td></tr>
                            <tr><td>Макс. цена</td><td>${tender.maxPrice || 3211649.00}</td><td>${maxPrice}</td></tr>
                            <tr><td>Дата публикации</td><td>${tender.publishDate || '2025-04-21T15:33:39Z'}</td><td>${publishDate}</td></tr>
                        </table>
                    `;
                    
                    tendersData.innerHTML = html;
                    
                    // Display formatting test results
                    formattingTest.innerHTML = `
                        <div class="alert alert-success">
                            <strong>Форматирование работает!</strong><br>
                            Регион "${regionCode}" → "${regionName}"<br>
                            Заказчик "${tender.customerName || 'ИНН: 7706114267'}" → "${customerName}"<br>
                            Цена ${tender.maxPrice || 3211649.00} → "${maxPrice}"<br>
                            Дата "${tender.publishDate || '2025-04-21T15:33:39Z'}" → "${publishDate}"
                        </div>
                    `;
                } else {
                    tendersData.innerHTML = '<div class="alert alert-warning">Нет данных тендеров</div>';
                }
                
            } catch (error) {
                apiResult.innerHTML = `
                    <div class="alert alert-danger">
                        <strong>Ошибка API:</strong><br>
                        ${error.message}<br>
                        Проверьте:<br>
                        1. Запущен ли бэкенд на localhost:5000<br>
                        2. Настройки CORS<br>
                        3. Сетевые настройки
                    </div>
                `;
                console.error('API test error:', error);
            }
        }
        
        // Formatting functions from controller
        function getRegionName(regionCode) {
            if (!regionCode) return 'Не указан';
            
            const regionCodes = {
                '77': 'Москва',
                '78': 'Санкт-Петербург',
                '50': 'Московская область',
                '47': 'Ленинградская область',
                '54': 'Новосибирская область',
                '66': 'Свердловская область',
                '23': 'Краснодарский край',
                '16': 'Республика Татарстан',
                '52': 'Нижегородская область',
                '74': 'Челябинская область',
                '61': 'Ростовская область',
                '63': 'Самарская область',
                '02': 'Республика Башкортостан',
                '24': 'Красноярский край',
                '59': 'Пермский край',
                '36': 'Воронежская область',
                '34': 'Волгоградская область',
                '64': 'Саратовская область',
                '72': 'Тюменская область',
                '38': 'Иркутская область',
                '21': 'Чувашская Республика'
            };
            
            // Check if it's already a name
            const regionNames = Object.values(regionCodes);
            if (regionNames.includes(regionCode)) {
                return regionCode;
            }
            
            // Look up in region codes mapping
            const regionName = regionCodes[regionCode];
            return regionName || `Регион ${regionCode}`;
        }
        
        function formatCustomerName(customerName) {
            if (!customerName) return 'Не указан';
            
            if (customerName.startsWith('ИНН:')) {
                return `Организация (${customerName})`;
            }
            
            return customerName;
        }
        
        function formatMaxPrice(maxPrice) {
            if (!maxPrice) return 'Не указана';
            return new Intl.NumberFormat('ru-RU', { style: 'currency', currency: 'RUB' }).format(maxPrice);
        }
        
        function formatDate(dateString) {
            if (!dateString) return 'Не указана';
            try {
                const date = new Date(dateString);
                if (isNaN(date.getTime())) {
                    return 'Неверный формат даты';
                }
                return date.toLocaleString('ru-RU', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            } catch (e) {
                return 'Ошибка формата даты';
            }
        }
    </script>
</body>
</html>
